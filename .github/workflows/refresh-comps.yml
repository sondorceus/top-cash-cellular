name: Weekly price refresh

on:
  # Every Monday at 06:00 UTC (01:00 Austin CDT)
  schedule:
    - cron: "0 6 * * 1"
  # Manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  iwm-price-table:
    name: Refresh IWM price table (all devices)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install playwright + chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape iPhone prices (5% below IWM)
        run: python scripts/build-price-table.py iphone
        timeout-minutes: 120

      - name: Scrape Samsung prices (10% below IWM)
        run: python scripts/build-price-table.py samsung
        timeout-minutes: 60

      - name: Convert MacBook prices
        run: |
          python scripts/build-price-table.py macbook

      - name: Merge all price tables
        id: merge
        run: |
          python scripts/build-price-table.py merge | tee /tmp/merge.log
          echo "log<<EOF" >> $GITHUB_OUTPUT
          tail -50 /tmp/merge.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet price-table-*.json price-table.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Summary of changes:" >> /tmp/diff-summary.txt
            git diff --stat price-table.json >> /tmp/diff-summary.txt 2>/dev/null || true
          fi

      - name: Open PR with refreshed prices
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: weekly IWM price refresh"
          title: "Weekly price refresh — IWM scrape"
          body: |
            Automated weekly refresh of device prices from ItsWorthMore.com.

            - **iPhone**: 5% below IWM (every condition × storage combo)
            - **Samsung**: 10% below IWM
            - **MacBook**: 10% below IWM (base chip/RAM config)

            Review the diff — prices that look wildly off may indicate
            a scraper issue (wrong quiz path, site change, etc).

            <details>
            <summary>Merge log</summary>

            ```
            ${{ steps.merge.outputs.log }}
            ```

            </details>
          branch: refresh-prices/weekly
          delete-branch: true

  pc-laptops:
    name: Refresh non-Apple laptop prices (IWM × 0.90)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Sitemap-driven HTTP scrape — no playwright. Discovers the live IWM
      # laptop catalog from sitemap.xml (their June-2026 URL restructure
      # killed the old bridge/catalog-derived target list: 3h of quiz-walks
      # against 404s, and the price file was never even written back).
      # Pulls the embedded pricing blob per page (~10 min total), MERGES
      # into pc-laptop-iwm-adjustments.json (never wholesale-replaces it),
      # and writes public/comps/iwm-pc-laptop-prices.json directly.
      - name: Scrape IWM laptop prices + additive specs (sitemap-driven)
        run: python scripts/scrape-iwm-sitemap.py
        timeout-minutes: 45
      - name: Apply IWM × 0.90 base prices to page.tsx
        run: python scripts/apply-iwm-pc-laptop-prices.py
      - name: Rebuild pc-laptop-specs.json
        run: |
          python scripts/build-pc-laptop-specs.py
          python scripts/build-lenovo-desktop-specs.py
      - name: Sync series topPrice ("Up to $X") with refreshed bases
        run: python scripts/fix-toppirce.py
      - name: Run verifier
        run: python scripts/verifier.py || true
      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet app/page.tsx public/comps/iwm-pc-laptop-prices.json public/comps/pc-laptop-specs.json pc-laptop-iwm-adjustments.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh PC laptop prices + additive specs (weekly IWM)"
          title: "Weekly PC laptop refresh — prices + additive specs"
          body: |
            Automated weekly refresh of non-Apple laptop pricing in `app/page.tsx`
            and the additive spec data behind PC_LAPTOP_SPECS
            (Lenovo / HP / Dell / Alienware / ASUS / Acer / LG / Samsung Galaxy
            Book / Razer / MSI).

            **Two scrapes run in this job:**
            - Flawless base prices → `public/comps/iwm-pc-laptop-prices.json`,
              applied to `app/page.tsx` at IWM × 0.90 (Skywalker's rule).
            - Per-submodel additive deltas (chip / RAM / storage / GPU / display
              / condition / battery / charger) → `pc-laptop-iwm-adjustments.json`,
              transformed into `public/comps/pc-laptop-specs.json` for runtime
              fetch.

            Review the diff — wildly-off prices may indicate a quiz-flow
            change on IWM, or a fuzzy-match drift for brands without bridge
            slugs (Alienware / Samsung / LG).
          branch: refresh-prices/pc-laptops
          delete-branch: true

  apple-trade-in:
    name: Refresh Apple Trade-In values
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install playwright + chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Run Apple refresh
        id: refresh
        run: |
          python scripts/refresh-apple-comps.py | tee /tmp/refresh.log
          echo "log<<EOF" >> $GITHUB_OUTPUT
          tail -200 /tmp/refresh.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet public/comps/apple-trade-in.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh Apple Trade-In comps (weekly)"
          title: "Weekly Apple Trade-In comp refresh"
          body: |
            Automated weekly refresh of `public/comps/apple-trade-in.json`.
            Values that moved >40% were kept at previous value.
          branch: refresh-comps/apple
          delete-branch: true

