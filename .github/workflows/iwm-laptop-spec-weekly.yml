name: IWM laptop spec weekly refresh

# Smart tracking system per Skywalker 2026-05-18, repointed 2026-07-13 to
# the sitemap pipeline (the old weekly-iwm-refresh.py walked the
# pre-June-2026 IWM URL space, which 404s, and carried a hardcoded MC key).
# Chain: sitemap scrape (fresh, no cache in CI) -> rebuild variant specs
# (stale-URL variants keep prior pricing) -> re-apply page bases.
# MC comms posting was dropped with the old script — the commit diff is
# the summary. To restore it, add MC_API_KEY as an Actions secret first;
# never hardcode it.

on:
  schedule:
    # Every Monday at 13:00 UTC (8:00 AM CT)
    - cron: "0 13 * * 1"
  # Manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  laptop-spec-refresh:
    name: Refresh laptop prices from IWM sitemap
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scrape IWM sitemap (full laptop catalog)
        run: python scripts/scrape-iwm-sitemap.py
        timeout-minutes: 20

      - name: Rebuild variant specs (preserves stale-URL variants)
        run: python scripts/build-pc-laptop-specs.py
        timeout-minutes: 5

      - name: Re-apply page bases
        run: python scripts/apply-iwm-pc-laptop-prices.py
        timeout-minutes: 5

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx pc-laptop-iwm-adjustments.json \
                  public/comps/iwm-pc-laptop-prices.json \
                  public/comps/pc-laptop-specs.json
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git commit -m "weekly IWM laptop refresh ($(date +%Y-%m-%d))

          Automated sitemap scrape -> spec rebuild -> base re-apply.
          "
          git push
