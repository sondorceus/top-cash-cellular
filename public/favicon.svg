<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e676"/>
      <stop offset="100%" style="stop-color:#00c853"/>
    </linearGradient>
  </defs>
  <!-- Green rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Phone outline icon -->
  <rect x="180" y="80" width="152" height="280" rx="24" stroke="white" stroke-width="16" fill="none"/>
  <!-- Home button line -->
  <line x1="220" y1="320" x2="292" y2="320" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Dollar arrow going UP out of phone (selling = getting cash) -->
  <path d="M256 220 L256 120" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <path d="M220 155 L256 115 L292 155" stroke="white" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- Dollar sign next to phone -->
  <text x="370" y="260" font-family="Arial,sans-serif" font-weight="900" font-size="160" fill="white" opacity="0.95">$</text>
  <!-- TC initials small at bottom -->
  <text x="256" y="430" font-family="Arial,sans-serif" font-weight="800" font-size="72" fill="white" text-anchor="middle" letter-spacing="8">TC</text>
</svg>
